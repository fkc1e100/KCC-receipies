---
# Node Pool Service Account
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: gke-cursor-np-sa
  namespace: config-control
  annotations:
    cnrm.cloud.google.com/project-id: "${PROJECT_ID}"
spec:
  displayName: "GKE Cursor Node Pool SA"

---
# Workload Service Account
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: gke-cursor-wl-sa
  namespace: config-control
  annotations:
    cnrm.cloud.google.com/project-id: "${PROJECT_ID}"
spec:
  displayName: "GKE Cursor Workload SA"

---
# Node Pool IAM Roles
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPartialPolicy
metadata:
  name: gke-cursor-np-sa-roles
  namespace: config-control
spec:
  resourceRef:
    kind: Project
    external: "projects/${PROJECT_ID}"
  bindings:
    - role: roles/logging.logWriter
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/monitoring.metricWriter
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/monitoring.viewer
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/stackdriver.resourceMetadata.writer
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/storage.objectViewer
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/artifactregistry.reader
      members:
        - member: "serviceAccount:gke-cursor-np-sa@${PROJECT_ID}.iam.gserviceaccount.com"

---
# Workload IAM Roles
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPartialPolicy
metadata:
  name: gke-cursor-wl-sa-roles
  namespace: config-control
spec:
  resourceRef:
    kind: Project
    external: "projects/${PROJECT_ID}"
  bindings:
    - role: roles/logging.logWriter
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/monitoring.metricWriter
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/monitoring.viewer
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/stackdriver.resourceMetadata.writer
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/storage.objectAdmin
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/artifactregistry.reader
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
    - role: roles/container.admin
      members:
        - member: "serviceAccount:gke-cursor-wl-sa@${PROJECT_ID}.iam.gserviceaccount.com"
